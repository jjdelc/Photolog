{% extends "base.html" %}
{% block content %}
<section class="extra-info">
<h1>Delete bad job from queue</h1>
<form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <p><label for="job_key">Job Key to delete</label>
        <input type="text" id="job_key" name="job_key" value="" placeholder="Bad job key"/>
        <input type="submit" value="Delete">
    </p>
</form>
    <hr/>
<form method="post" action="/jobs/bad/purge/all/">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <input type="submit" value="Purge all">
</form>
</section>
{% endblock %}
